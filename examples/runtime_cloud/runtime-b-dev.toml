[bundle]
version = 1

[resource]
name = "runtime-b"
cycle_interval_ms = 100

[runtime.control]
endpoint = "unix:///tmp/trust-runtime-b.sock"
mode = "production"
debug_enabled = false

[runtime.web]
enabled = true
listen = "127.0.0.1:18082"
auth = "local"
tls = false

[runtime.tls]
mode = "disabled"
require_remote = false

[runtime.discovery]
enabled = true
service_name = "runtime-b"
advertise = true
interfaces = ["lo"]

[runtime.mesh]
enabled = true
role = "peer"
listen = "127.0.0.1:5202"
connect = []
tls = false
zenohd_version = "1.7.2"
plugin_versions = {}
publish = []
subscribe = {}

[runtime.cloud]
profile = "dev"

[runtime.cloud.wan]
allow_write = []

[runtime.log]
level = "info"

[runtime.retain]
mode = "none"
save_interval_ms = 1000

[runtime.watchdog]
enabled = false
timeout_ms = 5000
action = "halt"

[runtime.fault]
policy = "halt"
