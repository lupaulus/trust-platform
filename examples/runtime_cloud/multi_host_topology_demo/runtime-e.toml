[bundle]
version = 1

[resource]
name = "runtime-e"
cycle_interval_ms = 100

[runtime.control]
endpoint = "unix:///tmp/trust-topology-runtime-e.sock"
mode = "production"
debug_enabled = false

[runtime.web]
enabled = true
listen = "127.0.0.1:19085"
auth = "local"
tls = false

[runtime.tls]
mode = "disabled"
require_remote = false

[runtime.discovery]
enabled = true
service_name = "runtime-e"
advertise = true
interfaces = ["lo"]
host_group = "remote-site"

[runtime.mesh]
enabled = true
role = "peer"
listen = "127.0.0.1:5305"
connect = [
  "127.0.0.1:5301",
  "127.0.0.1:5304"
]
tls = false
zenohd_version = "1.7.2"
plugin_versions = {}
publish = [
  "Remote.AlarmSummary",
  "Remote.InventoryCount"
]

[runtime.mesh.subscribe]
"runtime-a:Status.RunState" = "Remote.Hq.RunState"
"runtime-d:Gateway.SiteBridge" = "Remote.Gateway.SiteBridge"

[runtime.cloud]
profile = "dev"

[runtime.cloud.wan]
allow_write = []

[runtime.log]
level = "info"

[runtime.retain]
mode = "none"
save_interval_ms = 1000

[runtime.watchdog]
enabled = false
timeout_ms = 5000
action = "halt"

[runtime.fault]
policy = "halt"
