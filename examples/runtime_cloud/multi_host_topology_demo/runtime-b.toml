[bundle]
version = 1

[resource]
name = "runtime-b"
cycle_interval_ms = 100

[runtime.control]
endpoint = "unix:///tmp/trust-topology-runtime-b.sock"
mode = "production"
debug_enabled = false

[runtime.web]
enabled = true
listen = "127.0.0.1:19082"
auth = "local"
tls = false

[runtime.tls]
mode = "disabled"
require_remote = false

[runtime.discovery]
enabled = true
service_name = "runtime-b"
advertise = true
interfaces = ["lo"]
host_group = "hq-vm-cluster"

[runtime.mesh]
enabled = true
role = "peer"
listen = "127.0.0.1:5302"
connect = [
  "127.0.0.1:5301",
  "127.0.0.1:5303"
]
tls = false
zenohd_version = "1.7.2"
plugin_versions = {}
publish = [
  "LineA.Telemetry",
  "LineA.BatchCounter"
]

[runtime.mesh.subscribe]
"runtime-a:LineA.CommandSetpoint" = "LineA.CommandSetpoint"
"runtime-c:LineB.PackMlState" = "Remote.LineB.PackMlState"

[runtime.cloud]
profile = "dev"

[runtime.cloud.wan]
allow_write = []

[runtime.log]
level = "info"

[runtime.retain]
mode = "none"
save_interval_ms = 1000

[runtime.watchdog]
enabled = false
timeout_ms = 5000
action = "halt"

[runtime.fault]
policy = "halt"
