[bundle]
version = 1

[resource]
name = "web_ui_complete_project"
cycle_interval_ms = 20

[runtime.control]
endpoint = "unix:///tmp/trust-runtime.sock"
mode = "debug"
debug_enabled = true

[runtime.web]
enabled = true
listen = "0.0.0.0:8080"
auth = "local"
tls = false

[runtime.tls]
mode = "disabled"
require_remote = false

cert_path = "security/server-cert.pem"
[runtime.discovery]
enabled = true
service_name = "web-ui-updated"
advertise = true
interfaces = ["eth0"]

[runtime.mesh]
enabled = true
role = "peer"
listen = "0.0.0.0:5200"
connect = ["tcp://rapid-a:7447", "tcp://rapid-b:7447"]
tls = false
auth_token = ""
zenohd_version = "1.7.2"
plugin_versions = {}
publish = ["rapid/topic/status"]

subscribe = { "factory/line2/cmd" = "line2_cmd" }
[runtime.cloud]
profile = "dev"

[runtime.cloud.wan]
allow_write = [{ action = "cfg_apply", target = "live.example.com" }]

[runtime.opcua]
enabled = false
listen = "0.0.0.0:4840"
endpoint_path = "/"
namespace_uri = "urn:trust:runtime"
publish_interval_ms = 250
max_nodes = 128
expose = []
security_policy = "basic256sha256"
security_mode = "sign_and_encrypt"
allow_anonymous = false

[runtime.observability]
enabled = false
sample_interval_ms = 1000
mode = "all"
include = []
history_path = "history/historian.jsonl"
max_entries = 20000
prometheus_enabled = true
prometheus_path = "/metrics"
[runtime.log]
level = "debug"

[runtime.retain]
mode = "none"
save_interval_ms = 1000

[runtime.watchdog]
enabled = false
timeout_ms = 5000
action = "halt"

[runtime.fault]
policy = "halt"













[runtime.cloud.links]
transports = [{ source = "rapid-a", target = "rapid-b", transport = "realtime" }, { source = "rapid-a", target = "rapid-c", transport = "zenoh" }]






















